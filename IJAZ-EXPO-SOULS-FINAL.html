<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJAZ EXPO - Transparent Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --jarvis-cyan: #00fbff;
            --friday-amber: #ff8c00;
            --bg-dark: #000814;
        }

        body {
            background-color: #000;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            width: 100%; height: 100%;
            pointer-events: none;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 251, 255, 0.05) 0%, transparent 70%);
        }

        header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(0,8,20,0.85);
            border-bottom: 1px solid rgba(0,251,255,0.15);
            backdrop-filter: blur(12px);
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem;
        }

        .header-logo-diamond {
            width: 36px; height: 36px; border: 1px solid var(--jarvis-cyan);
            transform: rotate(45deg); display: flex; align-items: center; justify-content: center;
        }
        .header-logo-diamond span { transform: rotate(-45deg); font-family: 'Orbitron'; font-size: 8px; color: var(--jarvis-cyan); }

        .clock-time { font-family: 'Orbitron'; font-size: 16px; color: var(--jarvis-cyan); text-shadow: 0 0 10px var(--jarvis-cyan); }
        .clock-date { font-size: 8px; opacity: 0.4; text-align: right; text-transform: uppercase; }

        main { height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; position: relative; }
        
        .core-container {
            position: relative; width: 350px; height: 350px;
            display: flex; align-items: center; justify-content: center;
        }
        .core-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        .hw-widget {
            position: absolute; right: 40px; top: 100px;
            width: 200px; padding: 20px; border-left: 2px solid var(--jarvis-cyan);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .hw-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; letter-spacing: 1px; }
        .hw-key { opacity: 0.5; text-transform: uppercase; }
        .hw-val { color: var(--jarvis-cyan); font-family: monospace; font-weight: bold; }

        .vic-monitor {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 320px; text-align: center;
        }
        .vic-status { font-family: 'Orbitron'; font-size: 9px; letter-spacing: 0.2em; color: var(--jarvis-cyan); margin-bottom: 10px; }
        .vic-bar-track { height: 2px; background: rgba(255,255,255,0.05); overflow: hidden; position: relative; }
        .vic-bar-fill { height: 100%; width: 0%; background: var(--jarvis-cyan); box-shadow: 0 0 15px var(--jarvis-cyan); transition: width 0.5s ease; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header>
        <div style="display: flex; align-items: center;">
            <div class="header-logo-diamond"><span>IJAZ</span></div>
            <div style="margin-left: 1.5rem;">
                <span style="display: block; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 0.2em; color: var(--jarvis-cyan);">TRANSPARENT ARCHITECTURE</span>
                <span style="font-size: 9px; opacity: 0.4; text-transform: uppercase;">XEON-AUTHORITY-LAYER // SM-S926B</span>
            </div>
        </div>
        <div style="text-align: right;">
            <div class="clock-time" id="clock-time">00:00:00</div>
            <div class="clock-date" id="clock-date">LOADING...</div>
        </div>
    </header>

    <main>
        <div class="core-container">
            <canvas id="core-plasma" class="core-canvas"></canvas>
            <div style="position: absolute; bottom: -40px; text-align: center;">
                <span style="font-family: 'Orbitron'; font-size: 11px; color: var(--jarvis-cyan); letter-spacing: 0.3em;">PLASMA CORE</span>
                <span id="core-status" style="font-size: 9px; opacity: 0.6; display: block; margin-top: 6px;">INITIALIZING...</span>
            </div>
        </div>

        <div class="hw-widget">
            <div class="hw-row"><span class="hw-key">CPU Load</span><span class="hw-val" id="cpu-load">0.0%</span></div>
            <div class="hw-row"><span class="hw-key">Temp</span><span class="hw-val" id="cpu-temp">0°C</span></div>
            <div class="hw-row"><span class="hw-key">Latency</span><span class="hw-val" id="net-latency">0ms</span></div>
        </div>

        <div class="vic-monitor">
            <div id="vic-status" class="vic-status">UPLINK_PENDING</div>
            <div class="vic-bar-track"><div id="vic-bar" class="vic-bar-fill"></div></div>
        </div>
    </main>

    <script>
        (function boot() {
            // Configuration: Target your raw data file directly
            const DATA_URL = "https://raw.githubusercontent.com/tobeymarshall554-create/core-nexus-uplink/main/data.json";
            
            // Core Animation Vars
            const canvas = document.getElementById('core-plasma');
            const ctx = canvas.getContext('2d');
            let coreSpeed = 0.015;
            let time = 0;

            // 1. Clock Logic
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-time').textContent = now.toLocaleTimeString('en-US', { hour12: false });
                document.getElementById('clock-date').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
            }, 1000);

            // 2. High-Speed XEON Sync Logic
            async function syncXeon() {
                try {
                    // FAST PULL: Appending a timestamp (?t=...) forces GitHub to bypass cache
                    const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
                    const data = await response.json();
                    
                    document.getElementById('cpu-load').textContent = data.metrics.cpu + "%";
                    document.getElementById('cpu-temp').textContent = data.metrics.temp + "°C";
                    document.getElementById('net-latency').textContent = data.metrics.latency + "ms";
                    
                    // Link Visual Core Speed to Real CPU Utilization
                    coreSpeed = 0.01 + (data.metrics.cpu / 1000);
                    
                    if(document.getElementById('vic-status').textContent !== "ACTIVE") {
                        document.getElementById('vic-status').textContent = "ACTIVE";
                        document.getElementById('vic-bar').style.width = "100%";
                        document.getElementById('core-status').textContent = "STABLE";
                    }
                } catch (e) {
                    document.getElementById('vic-status').textContent = "RECONNECTING...";
                }
            }

            // 3. Plasma Core Animation
            function draw() {
                const w = canvas.width = 350;
                const h = canvas.height = 350;
                const cx = w/2, cy = h/2;
                ctx.clearRect(0,0,w,h);
                
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
                grad.addColorStop(0, 'rgba(0, 251, 255, 0.7)');
                grad.addColorStop(1, 'rgba(0, 251, 255, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, 65 + Math.sin(time*2)*8, 0, Math.PI*2);
                ctx.fill();

                time += coreSpeed;
                requestAnimationFrame(draw);
            }

            draw();
            syncXeon();
            setInterval(syncXeon, 2000); // 2-second high-speed sync
        })();
    </script>
</body>
</html>
