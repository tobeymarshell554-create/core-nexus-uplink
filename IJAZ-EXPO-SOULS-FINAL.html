<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJAZ EXPO - Transparent Architecture</title>
    <style>
        /* ── TAILWIND UTILITY REPLACEMENTS ─────────────────── */
        .flex          { display: flex; }
        .flex-col      { flex-direction: column; }
        .grid          { display: grid; }
        .relative      { position: relative; }
        .absolute      { position: absolute; }
        .sticky        { position: sticky; }
        .fixed         { position: fixed; }
        .inset-0       { top:0;right:0;bottom:0;left:0; }
        .top-0         { top: 0; }
        .top-1/2      { top: 50%; }
        .-top-1        { top: -0.25rem; }
        .left-1        { left: 0.25rem; }
        .left-1/2     { left: 50%; }
        .overflow-hidden { overflow: hidden; }
        .items-center  { align-items: center; }
        .items-start   { align-items: flex-start; }
        .justify-between { justify-content: space-between; }
        .justify-start { justify-content: flex-start; }
        .justify-center { justify-content: center; }
        .z-50          { z-index: 50; }
        .-translate-x-1/2 { transform: translateX(-50%); }
        .-translate-y-1/2 { transform: translateY(-50%); }
        .rotate-45     { transform: rotate(45deg); }
        .rotate-[-45deg] { transform: rotate(-45deg); }
        .uppercase     { text-transform: uppercase; }
        .font-bold     { font-weight: 700; }
        .font-mono     { font-family: ui-monospace, monospace; }
        .text-right    { text-align: right; }
        .text-xs       { font-size: 0.75rem; }
        .text-lg       { font-size: 1.125rem; }
        .text-[8px]  { font-size: 8px; }
        .text-[9px]  { font-size: 9px; }
        .text-[10px] { font-size: 10px; }
        .text-white    { color: #fff; }
        .text-cyan-400 { color: #22d3ee; }
        .text-cyan-500 { color: #06b6d4; }
        .tracking-[0.2em] { letter-spacing: 0.2em; }
        .tracking-widest    { letter-spacing: 0.25em; }
        .tracking-tighter   { letter-spacing: -0.05em; }
        .opacity-30    { opacity: 0.3; }
        .opacity-40    { opacity: 0.4; }
        .opacity-50    { opacity: 0.5; }
        .opacity-70    { opacity: 0.7; }
        .rounded-sm    { border-radius: 0.125rem; }
        .rounded-full  { border-radius: 9999px; }
        .border        { border-width: 1px; border-style: solid; }
        .border-b      { border-bottom-width: 1px; border-bottom-style: solid; }
        .border-white/5  { border-color: rgba(255,255,255,0.05); }
        .border-white/10 { border-color: rgba(255,255,255,0.1); }
        .border-cyan-500/30 { border-color: rgba(6,182,212,0.3); }
        .border-cyan-500/50 { border-color: rgba(6,182,212,0.5); }
        .bg-cyan-400   { background-color: #22d3ee; }
        .bg-cyan-500   { background-color: #06b6d4; }
        .bg-cyan-500/10 { background-color: rgba(6,182,212,0.1); }
        .bg-cyan-500/20 { background-color: rgba(6,182,212,0.2); }
        .bg-cyan-500/30 { background-color: rgba(6,182,212,0.3); }
        .bg-cyan-500/40 { background-color: rgba(6,182,212,0.4); }
        .bg-white/10  { background-color: rgba(255,255,255,0.1); }
        .bg-black/40  { background-color: rgba(0,0,0,0.4); }
        .backdrop-blur-sm { backdrop-filter: blur(4px); }
        .shadow-[0_0_8px_cyan] { box-shadow: 0 0 8px cyan; }
        .shadow-[0_0_5px_cyan] { box-shadow: 0 0 5px cyan; }
        .outline-none  { outline: none; }
        .transition-all { transition: all 0.15s ease; }
        .h-full        { height: 100%; }
        .w-full        { width: 100%; }
        .h-0.5        { height: 2px; }
        .h-1.5        { height: 6px; }
        .h-2           { height: 0.5rem; }
        .h-4           { height: 1rem; }
        .h-8           { height: 2rem; }
        .h-12          { height: 3rem; }
        .w-0.5        { width: 2px; }
        .w-1           { width: 0.25rem; }
        .w-1.5        { width: 6px; }
        .w-8           { width: 2rem; }
        .w-12          { width: 3rem; }
        .p-2           { padding: 0.5rem; }
        .p-3           { padding: 0.75rem; }
        .p-6           { padding: 1.5rem; }
        .p-8           { padding: 2rem; }
        .py-2          { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .pl-6          { padding-left: 1.5rem; }
        .pr-2          { padding-right: 0.5rem; }
        .pt-0          { padding-top: 0; }
        .mb-1          { margin-bottom: 0.25rem; }
        .mb-2          { margin-bottom: 0.5rem; }
        .mb-3          { margin-bottom: 0.75rem; }
        .mb-4          { margin-bottom: 1rem; }
        .mb-6          { margin-bottom: 1.5rem; }
        .mr-4          { margin-right: 1rem; }
        .gap-0.5      { gap: 0.125rem; }
        .gap-1         { gap: 0.25rem; }
        .gap-4         { gap: 1rem; }
        .gap-6         { gap: 1.5rem; }
        .gap-8         { gap: 2rem; }
        .gap-20        { gap: 5rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .grid-cols-12  { grid-template-columns: repeat(12, minmax(0, 1fr)); }
        .grid-cols-4   { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .col-span-2    { grid-column: span 2 / span 2; }
        .col-span-8    { grid-column: span 8 / span 8; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        /* focus states */
        input:focus.border-cyan-500/30 { border-color: #06b6d4; background-color: rgba(6,182,212,0.05); }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --jarvis-cyan: #00fbff;
            --friday-amber: #ff8c00;
            --veronica-red: #ff1111;
        }

        body {
            background-color: #000;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        #base-layer::-webkit-scrollbar { width: 2px; }
        #base-layer::-webkit-scrollbar-track { background: transparent; }
        #base-layer::-webkit-scrollbar-thumb { background: rgba(0, 251, 255, 0.3); border-radius: 10px; }
        .feed-scroll::-webkit-scrollbar { width: 2px; }
        .feed-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.01); }
        .feed-scroll::-webkit-scrollbar-thumb { background: var(--jarvis-cyan); box-shadow: 0 0 5px var(--jarvis-cyan); border-radius: 10px; }

        /* CANVAS BG */
        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .grid-bg { pointer-events: none; }

        /* BASE LAYER */
        #base-layer {
            position: fixed; inset: 0; z-index: 1; pointer-events: auto; overflow-y: auto; overflow-x: hidden;
        }
        #base-layer::-webkit-scrollbar { width: 3px; }
        #base-layer::-webkit-scrollbar-track { background: transparent; }
        #base-layer::-webkit-scrollbar-thumb { background: rgba(0,251,255,0.4); box-shadow: 0 0 6px rgba(0,251,255,0.6); border-radius: 10px; }

        /* CORE SYSTEM STYLES */
        .core-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .core-canvas {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            pointer-events: none;
        }

        .core-label {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            text-align: center;
            pointer-events: none;
        }
        .core-label-name {
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.22em;
            color: var(--core-color);
            text-shadow: 0 0 10px var(--core-color);
            display: block;
        }
        .core-label-stat {
            font-size: 7px;
            opacity: 0.45;
            letter-spacing: 0.15em;
            display: block;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="grid-bg"></div>

    <header id="main-header">
        <div class="header-logo-diamond">
            <span>IJAZ</span>
        </div>
        <div class="header-title-block">
            <span class="header-title">TRANSPARENT ARCHITECTURE</span>
            <span class="header-subtitle">Core Interface v4.6</span>
        </div>
        
        <div class="header-center">
            <div class="status-pill">
                <div class="status-pill-dot cyan"></div>
                <span>Jarvis: Online</span>
            </div>
            <div class="status-pill">
                <div class="status-pill-dot amber"></div>
                <span>Friday: Active</span>
            </div>
        </div>

        <div class="header-clock-cluster">
            <div class="clock-block">
                <div class="clock-time" id="clock-time">12:00:00</div>
                <div class="clock-date" id="clock-date">MARCH 24, 2026</div>
            </div>
        </div>
    </header>

    <main id="base-layer">
        <div class="core-container">
            <canvas id="core-plasma" class="core-canvas"></canvas>
            <div class="core-label">
                <span class="core-label-name">PLASMA CORE</span>
                <span class="core-label-stat">STABLE</span>
            </div>
        </div>
    </main>

    <script>
        // CORE INITIALIZATION & BOOT SEQUENCE
        (function boot() {
            console.log("XEON: Link Established via Sonnet 4.6 Protocol.");
            
            // Clock Update
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
                const dateStr = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
                
                const timeEl = document.getElementById('clock-time');
                const dateEl = document.getElementById('clock-date');
                if(timeEl) timeEl.textContent = timeStr;
                if(dateEl) dateEl.textContent = dateStr;
            }, 1000);

            // Dynamic Background Mouse Response
            let mx = 0.5, my = 0.5, tx = 0.5, ty = 0.5;
            document.addEventListener('mousemove', e => {
                tx = e.clientX / window.innerWidth;
                ty = e.clientY / window.innerHeight;
            });

            function tick() {
                mx += (tx - mx) * 0.04;
                my += (ty - my) * 0.04;
                const canvas = document.getElementById('bg-canvas');
                if (canvas) {
                    canvas.style.transform = `translateX(${(mx-0.5)*18}px) translateY(${(my-0.5)*12}px)`;
                }
                requestAnimationFrame(tick);
            }
            tick();
        })();
    </script>
</body>
</html>
