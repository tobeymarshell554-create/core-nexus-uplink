<head>

    <style>

        .bg-cyan-500/20 { background-color: rgba(6,182,212,0.2); }
        .bg-cyan-500/30 { background-color: rgba(6,182,212,0.3); }
        .bg-cyan-500/40 { background-color: rgba(6,182,212,0.4); }

        .h-full        { height: 100%; }

        .p-2           { padding: 0.5rem; }
        .p-3           { padding: 0.75rem; }

        .p-8           { padding: 2rem; }
        .py-2          { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .pl-6          { padding-left: 1.5rem; }

        .mb-2          { margin-bottom: 0.5rem; }
        .mb-3          { margin-bottom: 0.75rem; }
        .mb-4          { margin-bottom: 1rem; }
        .mb-6          { margin-bottom: 1.5rem; }

        .gap-0.5      { gap: 0.125rem; }
        .gap-1         { gap: 0.25rem; }

        .gap-8         { gap: 2rem; }
        .gap-20        { gap: 5rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .grid-cols-12  { grid-template-columns: repeat(12, minmax(0, 1fr)); }
        .grid-cols-4   { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .col-span-2    { grid-column: span 2 / span 2; }
        .col-span-8    { grid-column: span 8 / span 8; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
        /* focus states */
        input:focus.border-cyan-500/30 { border-color: #06b6d4; background-color: rgba(6,182,212,0.05); }

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --jarvis-cyan: #00fbff;
            --friday-amber: #ff8c00;
            --veronica-red: #ff1111;
        }

        body {
            background-color: #000;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,251,255,0.4); box-shadow: 0 0 6px rgba(0,251,255,0.6); border-radius: 10px; }

        /* CANVAS BG */
        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .grid-bg { 
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            background-image: linear-gradient(rgba(0,251,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,251,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(0,8,20,0.8);
            border-bottom: 1px solid rgba(0,251,255,0.15);
            backdrop-filter: blur(12px);
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem;
        }

        .header-logo-diamond {
            width: 36px; height: 36px; border: 1px solid var(--jarvis-cyan);
            transform: rotate(45deg); display: flex; align-items: center; justify-content: center;
        }
        .header-logo-diamond span { transform: rotate(-45deg); font-family: 'Orbitron'; font-size: 8px; color: var(--jarvis-cyan); }

        .header-title-block { margin-left: 1rem; line-height: 1.2; }
        .header-title { display: block; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 0.2em; color: var(--jarvis-cyan); }
        .header-subtitle { display: block; font-size: 8px; opacity: 0.4; text-transform: uppercase; }

        .status-pill { display: flex; align-items: center; gap: 8px; font-size: 9px; text-transform: uppercase; opacity: 0.7; }
        .status-pill-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-pill-dot.cyan { background: var(--jarvis-cyan); box-shadow: 0 0 8px var(--jarvis-cyan); }
        .status-pill-dot.amber { background: var(--friday-amber); box-shadow: 0 0 8px var(--friday-amber); }

        .clock-time { font-family: 'Orbitron'; font-size: 16px; color: var(--jarvis-cyan); text-shadow: 0 0 10px var(--jarvis-cyan); }
        .clock-date { font-size: 8px; opacity: 0.4; text-align: right; }

        /* CORE CONTAINER */
        main { height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; position: relative; }
        
        .core-container {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
        }
        .core-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        .core-label { position: absolute; bottom: -40px; text-align: center; }
        .core-label-name { font-family: 'Orbitron'; font-size: 10px; color: var(--jarvis-cyan); letter-spacing: 0.2em; display: block; }
        .core-label-stat { font-size: 8px; opacity: 0.5; margin-top: 4px; display: block; }

        /* VICTORIA INTEGRITY MONITOR */
        .vic-monitor {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 280px; text-align: center;
        }
        .vic-status { font-family: 'Orbitron'; font-size: 8px; letter-spacing: 0.1em; color: var(--jarvis-cyan); margin-bottom: 6px; }
        .vic-bar-track { height: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .vic-bar-fill { height: 100%; width: 0%; background: var(--jarvis-cyan); box-shadow: 0 0 8px var(--jarvis-cyan); transition: width 0.5s ease; }

        /* HARDWARE WIDGET */
        .hw-widget {
            position: absolute; right: 40px; top: 100px;
            width: 180px; padding: 15px; border-left: 1px solid rgba(0,251,255,0.1);
        }
        .hw-row { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 8px; }
        .hw-key { opacity: 0.5; text-transform: uppercase; }
        .hw-val { color: var(--jarvis-cyan); font-family: monospace; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="grid-bg"></div>

    <header id="main-header">
        <div class="flex items-center">
            <div class="header-logo-diamond">
                <span>IJAZ</span>
            </div>
            <div class="header-title-block">
                <span class="header-title">TRANSPARENT ARCHITECTURE</span>
                <span class="header-subtitle">SM-S926B // SM8650 Protocol</span>
            </div>
        </div>
        
        <div class="header-center flex gap-8">
            <div class="status-pill">
                <div class="status-pill-dot cyan"></div>
                <span>Jarvis: Online</span>
            </div>
            <div class="status-pill">
                <div class="status-pill-dot amber"></div>
                <span>Friday: Active</span>
            </div>
        </div>

        <div class="header-clock-cluster">
            <div class="clock-time" id="clock-time">00:00:00</div>
            <div class="clock-date" id="clock-date">LOADING...</div>
        </div>
    </header>

    <main>
        <div class="core-container">
            <canvas id="core-plasma" class="core-canvas"></canvas>
            <div class="core-label">
                <span class="core-label-name">PLASMA CORE</span>
                <span class="core-label-stat" id="core-status">INITIALIZING...</span>
            </div>
        </div>

        <div class="hw-widget">
            <div class="hw-row"><span class="hw-key">CPU Load</span><span class="hw-val" id="cpu-load">0.0%</span></div>
            <div class="hw-row"><span class="hw-key">CPU Temp</span><span class="hw-val" id="cpu-temp">0°C</span></div>
            <div class="hw-row"><span class="hw-key">GPU Util</span><span class="hw-val" id="gpu-util">0%</span></div>
            <div class="hw-row"><span class="hw-key">Device ID</span><span class="hw-val">SM-S926B</span></div>
        </div>

        <div class="vic-monitor">
            <div class="vic-status" id="vic-status">UPLINK_PENDING</div>
            <div class="vic-bar-track">
                <div class="vic-bar-fill" id="vic-bar"></div>
            </div>
        </div>
    </main>

    <script>
        (function boot() {
            console.log("XEON: Authority Layer Handshake Initiated.");

            // Clock Logic
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-time').textContent = now.toLocaleTimeString('en-US', { hour12: false });
                document.getElementById('clock-date').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
            }, 1000);

            // Background Parallax
            let mx = 0.5, my = 0.5, tx = 0.5, ty = 0.5;
            document.addEventListener('mousemove', e => {
                tx = e.clientX / window.innerWidth;
                ty = e.clientY / window.innerHeight;
            });

            function bgTick() {
                mx += (tx - mx) * 0.04;
                my += (ty - my) * 0.04;
                const bg = document.getElementById('bg-canvas');
                if (bg) bg.style.transform = `translateX(${(mx-0.5)*18}px) translateY(${(my-0.5)*12}px)`;
                requestAnimationFrame(bgTick);
            }
            bgTick();

            // Hardware Logic & Handshake
            let hardwareState = {
                cpu_utilization: 0,
                cpu_temp_celsius: 32,
                gpu_utilization: 0,
                device_spoof: "SM-S926B"
            };

            async function xeonHandshake() {
                const statusEl = document.getElementById('vic-status');
                const barEl = document.getElementById('vic-bar');
                
                statusEl.textContent = "SYN_SENT";
                barEl.style.width = "30%";
                
                await new Promise(r => setTimeout(r, 800));
                statusEl.textContent = "ACK_RECEIVED";
                barEl.style.width = "75%";
                
                await new Promise(r => setTimeout(r, 600));
                statusEl.textContent = "STABLE_UPLINK";
                barEl.style.width = "100%";
                document.getElementById('core-status').textContent = "STABLE";
                
                startMonitoring();
            }

            function startMonitoring() {
                setInterval(() => {
                    // Simulate fluctuating hardware metrics
                    hardwareState.cpu_utilization = (Math.random() * 45 + 5).toFixed(1);
                    hardwareState.cpu_temp_celsius = Math.floor(Math.random() * 10 + 35);
                    hardwareState.gpu_utilization = Math.floor(Math.random() * 20 + 2);

                    document.getElementById('cpu-load').textContent = hardwareState.cpu_utilization + "%";
                    document.getElementById('cpu-temp').textContent = hardwareState.cpu_temp_celsius + "°C";
                    document.getElementById('gpu-util').textContent = hardwareState.gpu_utilization + "%";
                    
                    // Core speed linked to CPU load
                    coreSpeed = 0.02 + (hardwareState.cpu_utilization / 1000);
                }, 2000);
            }

            // Plasma Core Rendering
            const canvas = document.getElementById('core-plasma');
            const ctx = canvas.getContext('2d');
            let coreSpeed = 0.02;
            let time = 0;

            function drawCore() {
                const w = canvas.width = canvas.offsetWidth;
                const h = canvas.height = canvas.offsetHeight;
                const cx = w/2, cy = h/2;
                ctx.clearRect(0,0,w,h);

                // Outer Rings
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, 100 + i*15, time * (i+1) * 0.5, time * (i+1) * 0.5 + Math.PI);
                    ctx.strokeStyle = `rgba(0, 251, 255, ${0.1 + i*0.1})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Plasma Glow
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
                grad.addColorStop(0, 'rgba(0, 251, 255, 0.8)');
                grad.addColorStop(0.5, 'rgba(0, 251, 255, 0.2)');
                grad.addColorStop(1, 'rgba(0, 251, 255, 0)');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, 80 + Math.sin(time*2)*5, 0, Math.PI*2);
                ctx.fill();

                time += coreSpeed;
                requestAnimationFrame(drawCore);
            }
            drawCore();
            xeonHandshake();
        })();
    </script>
</body>
</html>
