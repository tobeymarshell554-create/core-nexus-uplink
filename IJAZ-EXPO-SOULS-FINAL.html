<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IJAZ EXPO - Transparent Architecture</title>
    <style>
        /* ── UTILITY & CORE STYLES ── */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --jarvis-cyan: #00fbff;
            --friday-amber: #ff8c00;
            --veronica-red: #ff1111;
            --bg-dark: #000814;
        }

        body {
            background-color: #000;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        #bg-canvas {
            position: fixed; inset: 0; z-index: -1;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* HEADER */
        header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(0,8,20,0.8);
            border-bottom: 1px solid rgba(0,251,255,0.15);
            backdrop-filter: blur(12px);
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem;
        }

        .header-logo-diamond {
            width: 36px; height: 36px; border: 1px solid var(--jarvis-cyan);
            transform: rotate(45deg); display: flex; align-items: center; justify-content: center;
        }
        .header-logo-diamond span { transform: rotate(-45deg); font-family: 'Orbitron'; font-size: 8px; color: var(--jarvis-cyan); }

        .header-title-block { margin-left: 1rem; line-height: 1.2; }
        .header-title { display: block; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 0.2em; color: var(--jarvis-cyan); }
        .header-subtitle { display: block; font-size: 8px; opacity: 0.4; text-transform: uppercase; }

        .status-pill { display: flex; align-items: center; gap: 8px; font-size: 9px; text-transform: uppercase; opacity: 0.7; }
        .status-pill-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-pill-dot.cyan { background: var(--jarvis-cyan); box-shadow: 0 0 8px var(--jarvis-cyan); }
        .status-pill-dot.amber { background: var(--friday-amber); box-shadow: 0 0 8px var(--friday-amber); }

        .clock-time { font-family: 'Orbitron'; font-size: 16px; color: var(--jarvis-cyan); text-shadow: 0 0 10px var(--jarvis-cyan); }
        .clock-date { font-size: 8px; opacity: 0.4; text-align: right; }

        /* MAIN HUD ELEMENTS */
        main { height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; position: relative; }
        
        .core-container {
            position: relative; width: 320px; height: 320px;
            display: flex; align-items: center; justify-content: center;
        }
        .core-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        /* HARDWARE WIDGET */
        .hw-widget {
            position: absolute; right: 40px; top: 100px;
            width: 180px; padding: 15px; border-left: 1px solid rgba(0,251,255,0.1);
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }
        .hw-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; letter-spacing: 1px; }
        .hw-key { opacity: 0.5; text-transform: uppercase; }
        .hw-val { color: var(--jarvis-cyan); font-family: monospace; }

        /* VICTORIA INTEGRITY MONITOR */
        .vic-monitor {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 300px; text-align: center;
        }
        .vic-status { font-family: 'Orbitron'; font-size: 8px; letter-spacing: 0.2em; color: var(--jarvis-cyan); margin-bottom: 8px; }
        .vic-bar-track { height: 2px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .vic-bar-fill { height: 100%; width: 0%; background: var(--jarvis-cyan); box-shadow: 0 0 10px var(--jarvis-cyan); transition: width 0.4s ease; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header>
        <div style="display: flex; align-items: center;">
            <div class="header-logo-diamond"><span>IJAZ</span></div>
            <div class="header-title-block">
                <span class="header-title">TRANSPARENT ARCHITECTURE</span>
                <span class="header-subtitle">XEON AUTHORITY LAYER // SM-S926B</span>
            </div>
        </div>
        
        <div style="display: flex; gap: 2rem;">
            <div class="status-pill"><div class="status-pill-dot cyan"></div><span>Jarvis: Online</span></div>
            <div class="status-pill"><div class="status-pill-dot amber"></div><span>Friday: Active</span></div>
        </div>

        <div>
            <div class="clock-time" id="clock-time">00:00:00</div>
            <div class="clock-date" id="clock-date">LOADING...</div>
        </div>
    </header>

    <main>
        <div class="core-container">
            <canvas id="core-plasma" class="core-canvas"></canvas>
            <div style="position: absolute; bottom: -30px; text-align: center;">
                <span style="font-family: 'Orbitron'; font-size: 10px; color: var(--jarvis-cyan); letter-spacing: 0.2em;">PLASMA CORE</span>
                <span id="core-status" style="font-size: 8px; opacity: 0.5; display: block; margin-top: 4px;">INITIALIZING...</span>
            </div>
        </div>

        <div class="hw-widget">
            <div class="hw-row"><span class="hw-key">CPU Load</span><span class="hw-val" id="cpu-load">0.0%</span></div>
            <div class="hw-row"><span class="hw-key">CPU Temp</span><span class="hw-val" id="cpu-temp">0°C</span></div>
            <div class="hw-row"><span class="hw-key">GPU Util</span><span class="hw-val" id="gpu-util">0%</span></div>
            <div class="hw-row"><span class="hw-key">Device</span><span class="hw-val">SM-S926B</span></div>
        </div>

        <div class="vic-monitor">
            <div class="vic-status" id="vic-status">UPLINK_PENDING</div>
            <div class="vic-bar-track"><div class="vic-bar-fill" id="vic-bar"></div></div>
        </div>
    </main>

    <script>
        (function boot() {
            // Clock Logic
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock-time').textContent = now.toLocaleTimeString('en-US', { hour12: false });
                document.getElementById('clock-date').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
            }, 1000);

            // Xeon Handshake Sequence
            async function initiateXeonLink() {
                const statusEl = document.getElementById('vic-status');
                const barEl = document.getElementById('vic-bar');
                const coreEl = document.getElementById('core-status');

                const steps = [
                    { msg: "SYNC_REQUEST_SENT", p: 20 },
                    { msg: "AUTHORITY_LAYER_ACK", p: 45 },
                    { msg: "METRIC_HANDSHAKE_ESTABLISHED", p: 75 },
                    { msg: "STABLE_UPLINK", p: 100 }
                ];

                for (let step of steps) {
                    statusEl.textContent = step.msg;
                    barEl.style.width = step.p + "%";
                    await new Promise(r => setTimeout(r, 600));
                }
                
                coreEl.textContent = "STABLE";
                startMetricStreaming();
            }

            function startMetricStreaming() {
                setInterval(() => {
                    // Simulate metric tracking from the backend repository
                    const cpu = (Math.random() * 30 + 5).toFixed(1);
                    const temp = Math.floor(Math.random() * 8 + 38);
                    const gpu = Math.floor(Math.random() * 15 + 5);

                    document.getElementById('cpu-load').textContent = cpu + "%";
                    document.getElementById('cpu-temp').textContent = temp + "°C";
                    document.getElementById('gpu-util').textContent = gpu + "%";
                    
                    // Adjust plasma speed based on "XEON" power level
                    coreSpeed = 0.01 + (cpu / 800);
                }, 1500);
            }

            // Plasma Core Animation
            const canvas = document.getElementById('core-plasma');
            const ctx = canvas.getContext('2d');
            let coreSpeed = 0.015;
            let time = 0;

            function draw() {
                const w = canvas.width = 320;
                const h = canvas.height = 320;
                ctx.clearRect(0,0,w,h);
                
                const cx = w/2, cy = h/2;
                
                // Pulsing Center
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 70);
                grad.addColorStop(0, 'rgba(0, 251, 255, 0.6)');
                grad.addColorStop(1, 'rgba(0, 251, 255, 0)');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, 60 + Math.sin(time)*5, 0, Math.PI*2);
                ctx.fill();

                // Rotating Rings
                ctx.strokeStyle = 'rgba(0, 251, 255, 0.3)';
                ctx.lineWidth = 1;
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, 80 + i*12, time * (i+1) * 0.5, time * (i+1) * 0.5 + Math.PI);
                    ctx.stroke();
                }

                time += coreSpeed;
                requestAnimationFrame(draw);
            }

            draw();
            initiateXeonLink();
        })();
    </script>
</body>
</html>
